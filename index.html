<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NutriCoach</title>
<style>
:root{--bg:#F7F5F0;--card:#FFF;--green:#2D6A4F;--gl:#E8F5EE;--gm:#52B788;--amber:#E76F51;--al:#FDF0EC;--blue:#2B6CB0;--bl:#EBF4FF;--gray:#6B7280;--grl:#F3F4F6;--border:#E5E7EB;--text:#1F2937;--ts:#6B7280;--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;font-size:10px;color:var(--gray);transition:color 0.15s;}
.nb.active{color:var(--green);}
.nb svg{width:22px;height:22px;stroke-width:1.8;}
.header{background:var(--green);color:white;padding:52px 20px 16px;position:sticky;top:0;z-index:50;}
.header h1{font-size:20px;font-weight:700;}
.header p{font-size:12px;opacity:0.8;margin-top:2px;}
.page{display:none;padding:14px 14px 90px;}
.page.active{display:block;}
.card{background:var(--card);border-radius:var(--r);padding:15px;margin-bottom:12px;border:1px solid var(--border);}
.ctitle{font-size:13px;font-weight:600;color:var(--green);margin-bottom:10px;}
.dscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none;}
.dscroll::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card);color:var(--gray);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.dtab.active{background:var(--green);color:white;border-color:var(--green);}
.dtab.past{background:#F3F4F6;color:#9CA3AF;border-color:transparent;}
.badge{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500;display:inline-block;}
.br{background:#FEF3C7;color:#92400E;}
.bt{background:#E8F5EE;color:#1B4332;}
.bd{background:#F3F4F6;color:#6B7280;}
.bl{background:#FEE2E2;color:#991B1B;}
.bf{background:#FEF3C7;color:#92400E;}
.mrow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #F3F4F6;align-items:flex-start;}
.mrow:last-child{border-bottom:none;padding-bottom:0;}
.mi{font-size:17px;flex-shrink:0;margin-top:1px;}
.ml{font-size:11px;color:var(--ts);width:78px;flex-shrink:0;padding-top:2px;}
.mc{flex:1;}
.mt{font-size:13px;line-height:1.45;color:var(--text);}
.mn{font-size:11px;color:var(--blue);margin-top:3px;line-height:1.4;}
.sbox{margin-top:12px;border-radius:var(--rs);padding:10px 12px;font-size:12px;line-height:1.6;}
.sm{background:#EBF4FF;color:#1E40AF;}
.st{background:#E8F5EE;color:#065F46;}
.sd{background:#F3F4F6;color:#6B7280;}
.dhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.dn{font-size:17px;font-weight:700;}
.ss{margin-bottom:14px;}
.sh{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--rs);margin-bottom:6px;font-size:13px;font-weight:600;}
.si-wrap{background:var(--card);border-radius:var(--r);overflow:hidden;border:1px solid var(--border);}
.si{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background 0.1s;user-select:none;}
.si:last-child{border-bottom:none;}
.si:active{background:#F3F4F6;}
.si.ck{opacity:0.4;}
.si.ck .st2{text-decoration:line-through;}
.sc{width:20px;height:20px;border:1.5px solid var(--border);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.si.ck .sc{background:var(--green);border-color:var(--green);}
.st2{font-size:14px;color:var(--text);flex:1;}
.stag{font-size:10px;color:var(--ts);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.smc{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;}
.smc .lb{font-size:10px;color:var(--ts);margin-bottom:2px;}
.smc .vl{font-size:14px;font-weight:600;}
.chat-msgs{display:flex;flex-direction:column;gap:10px;padding-bottom:8px;}
.msg{max-width:85%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.5;}
.mai{background:var(--card);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
.mu{background:var(--green);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.mlb{font-size:10px;color:var(--ts);margin-bottom:3px;}
.mlbu{text-align:right;}
.ci-wrap{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-end;z-index:90;}
.ci{flex:1;border:1px solid var(--border);border-radius:20px;padding:9px 14px;font-size:14px;resize:none;max-height:100px;overflow-y:auto;outline:none;font-family:inherit;background:var(--bg);}
.ci:focus{border-color:var(--gm);}
.cs{width:38px;height:38px;border-radius:50%;background:var(--green);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cs:active{background:var(--gm);}
.cs svg{width:18px;height:18px;}
.chat-page{padding-bottom:130px;}
.lf{display:flex;flex-direction:column;gap:10px;}
.llb{font-size:12px;font-weight:600;color:var(--ts);margin-bottom:4px;display:block;}
.li{width:100%;border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;}
.li:focus{border-color:var(--gm);}
.lrow{display:flex;gap:8px;}
.btn{width:100%;padding:13px;border-radius:var(--rs);border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btnp{background:var(--green);color:white;}
.btnp:active{background:#1B4332;}
.btns{background:#F3F4F6;color:var(--text);}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{padding:5px 11px;border-radius:16px;font-size:12px;border:1px solid var(--border);background:var(--card);color:var(--gray);cursor:pointer;}
.chip:active{background:#E8F5EE;border-color:var(--green);color:var(--green);}
.loading{display:flex;gap:4px;align-items:center;padding:4px 0;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--gray);animation:pulse 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{opacity:0.3;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.sep{height:1px;background:var(--border);margin:12px 0;}
.rbtn{width:100%;padding:10px;border-radius:var(--rs);border:1px solid var(--border);background:none;font-size:13px;color:var(--gray);cursor:pointer;margin-top:8px;}
textarea{resize:none;}
</style>
</head>

  </div>
</div>

let aday=1, shopCk=new Set(), hist=[];

function sp(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  const T={menu:'🥗 NutriCoach',shop:'🛒 Lista de la compra',log:'📝 Registro del día',chat:'💬 Chat con NutriCoach'};
  document.getElementById('htitle').textContent=T[page];
}

function renderTabs(){
  document.getElementById('dtabs').innerHTML=DAYS.map((d,i)=>{
    let c='dtab';
    if(i===aday)c+=' active';
    else if(d.sport==='pasado')c+=' past';
    return `<div class="${c}" onclick="sd(${i})">${d.name}</div>`;
  }).join('');
}

function sd(i){aday=i;renderTabs();renderDay();}

function renderDay(){
  const d=DAYS[aday];
  const ip=d.sport==='pasado', ir=d.sport==='descanso';
  const bc=ip?'bd':ir?'br':'bt';
  const meals=d.meals.map(m=>`
    <div class="mrow">
      <div class="mi">${m.i}</div>
      <div class="ml">${m.l}</div>
      <div class="mc">
        <div class="mt">${m.t}${m.fav?' <span class="badge bf">favorita</span>':''}${m.levo?' <span class="badge bl">levo ⏱</span>':''}</div>
        ${m.n?`<div class="mn">${m.n}</div>`:''}
      </div>
    </div>`).join('');
  const sport=ip?`<div class="sbox sd">${d.sd}</div>`:
    ir?`<div class="sbox sd">🛌 <strong>Descanso:</strong> ${d.sd}</div>`:
    `<div class="sbox sm">🌅 <strong>Entrenas mañana:</strong> ${d.sm}</div>
     <div class="sbox st" style="margin-top:8px">🌆 <strong>Entrenas tarde:</strong> ${d.st}</div>`;
  document.getElementById('dcontent').innerHTML=`
    <div class="card">
      <div class="dhead"><div class="dn">${d.full}</div><span class="badge ${bc}">${d.sl}</span></div>
      ${meals}${sport}
      ${!ip?`<button class="btn btns" style="margin-top:12px;font-size:13px" onclick="chatDay('${d.full}')">Ajustar este día en el chat ↗</button>`:''}
    </div>`;
}

function chatDay(n){
  document.querySelectorAll('.nb')[3].click();
  document.getElementById('cinput').value=`Hoy es ${n}. Ajústame el menú según mi entreno.`;
  document.getElementById('cinput').focus();
}

function renderShop(){
  let tot=0,dn=0;
  document.getElementById('shopcontent').innerHTML=SHOP.map(s=>{
    const items=s.items.map((it,ii)=>{
      const k=s.t+ii; tot++;
      const ck=shopCk.has(k); if(ck)dn++;
      return `<div class="si ${ck?'ck':''}" onclick="tgShop('${k}')">
        <div class="sc">${ck?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}</div>
        <span class="st2">${it.t}</span><span class="stag">${it.tag}</span>
      </div>`;
    }).join('');
    return `<div class="ss">
      <div class="sh" style="background:${s.bg};color:${s.tc}">${s.t}</div>
      <div class="si-wrap">${items}</div>
    </div>`;
  }).join('');
  document.getElementById('stotal').textContent=tot+' items';
  document.getElementById('sdone').textContent=dn+' ✓';
}

function tgShop(k){shopCk.has(k)?shopCk.delete(k):shopCk.add(k);renderShop();}
function resetShop(){shopCk.clear();renderShop();}

function setSport(el,v){document.getElementById('lsp').value=v;}

function submitLog(){
  const day=document.getElementById('lday').value;
  const parts=[
    document.getElementById('ld').value && `• Desayuno: ${document.getElementById('ld').value}`,
    document.getElementById('lm').value && `• Media mañana: ${document.getElementById('lm').value}`,
    document.getElementById('lc').value && `• Comida: ${document.getElementById('lc').value}`,
    document.getElementById('lme').value && `• Merienda: ${document.getElementById('lme').value}`,
    document.getElementById('lce').value && `• Cena: ${document.getElementById('lce').value}`,
  ].filter(Boolean);
  const sp=document.getElementById('lsp').value;
  const h=document.getElementById('lh').value;
  const du=document.getElementById('ldur').value;
  let msg=`Analiza lo que he comido el ${day}:\n${parts.join('\n')}`;
  if(sp) msg+=`\n\nDeporte: ${sp}${h?' a las '+h+'h':''}${du?' durante '+du+' min':''}`;
  document.querySelectorAll('.nb')[3].click();
  document.getElementById('cinput').value=msg;
  send();
}

function addMsg(role,text){
  const w=document.getElementById('cmsgs');
  const ai=role==='assistant';
  const d=document.createElement('div');
  d.innerHTML=`<div class="mlb ${ai?'':'mlbu'}">${ai?'NutriCoach':'Tú'}</div>
    <div class="msg ${ai?'mai':'mu'}">${text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`;
  w.appendChild(d);
  w.scrollTop=w.scrollHeight;
}

function addLoad(){
  const w=document.getElementById('cmsgs');
  const d=document.createElement('div');
  d.id='ldmsg';
  d.innerHTML=`<div class="mlb">NutriCoach</div><div class="msg mai"><div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  w.appendChild(d);w.scrollTop=w.scrollHeight;return d;
}

async function send(){
  const inp=document.getElementById('cinput');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',txt);
  hist.push({role:'user',content:txt});
  const ld=addLoad();
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:SYS,messages:hist})
    });
    const data=await r.json();
    ld.remove();
    const rep=data.content&&data.content[0]?data.content[0].text:'Error al conectar. Inténtalo de nuevo.';
    addMsg('assistant',rep);
    hist.push({role:'assistant',content:rep});
  }catch(e){
    ld.remove();
    addMsg('assistant','Error de conexión. Comprueba tu red e inténtalo de nuevo.');
  }
}

function ar(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function hk(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

function initChat(){
  hist=[];
  addMsg('assistant','¡Hola Laia! 👋 Soy NutriCoach.\n\nTengo cargado tu menú semanal, recetario completo y dieta base.\n\nPuedo ayudarte a:\n• Ajustar el menú del día\n• Analizar lo que has comido\n• Proponer recetas alternativas\n• Resolver dudas nutricionales\n\n¿En qué te ayudo hoy? 😊');
  const w=document.getElementById('cmsgs');
  const chips=['¿Qué como si entreno tarde hoy?','Proponme una alternativa para cenar','¿Puedo tomar café con leche con la levotiroxina?','Analiza esta receta nueva'];
  const d=document.createElement('div');
  d.className='chips';d.style.marginTop='8px';
  d.innerHTML=chips.map(c=>`<div class="chip" onclick="useChip('${c}')">${c}</div>`).join('');
  w.appendChild(d);
}

function useChip(t){document.getElementById('cinput').value=t;send();}

renderTabs();renderDay();renderShop();initChat();
